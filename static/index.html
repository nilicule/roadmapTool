<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="toolbar">
    <h1 class="toolbar__title" id="roadmap-title">Roadmap</h1>
    <div class="toolbar__actions">
      <button id="btn-new" class="btn btn--icon" title="New roadmap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </button>
      <button id="btn-swimlane" class="btn btn--icon" title="Group by assignee">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
          <circle cx="7" cy="6" r="2" fill="currentColor"/>
          <circle cx="14" cy="12" r="2" fill="currentColor"/>
          <circle cx="9" cy="18" r="2" fill="currentColor"/>
        </svg>
      </button>
<button id="btn-import" class="btn btn--icon" title="Import YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button id="btn-edit-yaml" class="btn btn--icon" title="Edit YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button id="btn-export" class="btn btn--icon" title="Export YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <button id="btn-export-png" class="btn btn--icon" title="Export PNG">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <button id="btn-today" class="btn btn--icon" title="Scroll to today">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="18" stroke-width="2.5"/><line x1="10" y1="16" x2="14" y2="16" stroke-width="2.5"/>
        </svg>
      </button>
      <button id="btn-undo" class="btn" title="Undo (Ctrl+Z)">↩</button>
      <button id="btn-redo" class="btn" title="Redo (Ctrl+Y)">↪</button>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="btn">−</button>
        <span id="zoom-label">Year</span>
        <button id="btn-zoom-in" class="btn">+</button>
      </div>
    </div>
  </header>

  <div class="legend" id="legend"></div>

  <div id="filter-bar" class="filter-bar hidden">
    <select id="filter-assignee" class="filter-select">
      <option value="">All assignees</option>
    </select>
    <select id="filter-tag" class="filter-select">
      <option value="">All tags</option>
    </select>
    <button id="filter-overdue" class="btn btn--filter" title="Show overdue tasks only">Overdue</button>
    <button id="filter-completed" class="btn btn--filter" title="Hide completed tasks">Hide done</button>
    <button id="filter-clear" class="btn btn--filter-clear hidden">Clear filters</button>
  </div>

  <div id="empty-state" class="hidden">
    <div class="empty-state__content">
      <svg class="empty-state__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/>
      </svg>
      <h2>No roadmap yet</h2>
      <p>Answer a few quick questions to set up your project timeline.</p>
      <button id="btn-get-started" class="btn btn--primary">Get started</button>
    </div>
  </div>

  <div class="chart-container">
    <svg id="roadmap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="task-popup">
      <div id="task-popup-name"></div>
      <div id="task-popup-tags"></div>
      <div id="task-popup-assignee"></div>
      <div id="task-popup-notes"></div>
    </div>
  </div>

  <div id="template-picker" class="template-picker hidden">
    <div class="template-picker__backdrop" id="template-picker-backdrop"></div>
    <div class="template-picker__panel">
      <h2 class="template-picker__title">Start from a template</h2>
      <div class="template-picker__grid" id="template-grid"></div>
      <button id="template-picker-cancel" class="btn">Cancel</button>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Add Group</h2>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <div class="modal__actions">
          <button type="submit" class="btn btn--primary">Save</button>
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="button" id="modal-delete" class="btn btn--danger hidden">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
