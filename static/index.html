<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Tool</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar__title-group">
      <h1 class="toolbar__title" id="roadmap-title">Roadmap</h1>
      <a id="title-source-link" class="hidden" target="_blank" title="Open source URL">
        <svg class="icon-link" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <svg class="icon-link-broken" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 17H7a5 5 0 0 1 0-10h2"/>
          <path d="M15 7h2a5 5 0 0 1 0 10h-2"/>
          <line x1="2" y1="2" x2="22" y2="22"/>
        </svg>
      </a>
    </div>
    <div class="toolbar__actions">
      <span id="readonly-badge" class="readonly-badge hidden">Read-only</span>
      <button id="btn-theme" class="btn--theme" title="Toggle dark mode">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button id="btn-new" class="btn btn--icon" title="New roadmap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
      </button>
<button id="btn-import" class="btn btn--icon" title="Import YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button id="btn-edit-yaml" class="btn btn--icon" title="Edit YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button id="btn-export" class="btn btn--icon" title="Export YAML">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </button>
      <button id="btn-export-png" class="btn btn--icon" title="Export PNG">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <button id="btn-today" class="btn btn--icon" title="Scroll to today">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="12" y1="14" x2="12" y2="18" stroke-width="2.5"/><line x1="10" y1="16" x2="14" y2="16" stroke-width="2.5"/>
        </svg>
      </button>
      <button id="btn-undo" class="btn" title="Undo (Ctrl+Z)">↩</button>
      <button id="btn-redo" class="btn" title="Redo (Ctrl+Y)">↪</button>
      <div class="zoom-controls">
        <button id="btn-zoom-out" class="btn">−</button>
        <span id="zoom-label">Year</span>
        <button id="btn-zoom-in" class="btn">+</button>
      </div>
    </div>
  </header>

  <div class="legend" id="legend"></div>

  <div id="filter-bar" class="filter-bar hidden">
    <button id="btn-swimlane" class="btn btn--filter" title="Group by assignee">Group by assignee</button>
    <button id="btn-collapse-all" class="btn btn--filter hidden" title="Collapse all groups">Collapse all</button>
    <button id="btn-expand-all" class="btn btn--filter hidden" title="Expand all groups">Expand all</button>
    <select id="filter-assignee" class="filter-select">
      <option value="">All assignees</option>
    </select>
    <select id="filter-tag" class="filter-select">
      <option value="">All tags</option>
    </select>
    <button id="filter-overdue" class="btn btn--filter" title="Show overdue tasks only">Overdue</button>
    <button id="filter-completed" class="btn btn--filter" title="Hide completed tasks">Hide done</button>
    <button id="filter-clear" class="btn btn--filter-clear hidden">Clear filters</button>
  </div>

  <div id="empty-state" class="hidden">
    <div class="empty-state__content">
      <svg class="empty-state__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
        <line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="13" y2="18"/>
      </svg>
      <h2>No roadmap yet</h2>
      <p>Answer a few quick questions to set up your project timeline.</p>
      <button id="btn-get-started" class="btn btn--primary">Get started</button>
    </div>
  </div>

  <div class="chart-container">
    <svg id="roadmap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="task-popup">
      <div id="task-popup-name"></div>
      <div id="task-popup-dates"></div>
      <div id="task-popup-tags"></div>
      <div id="task-popup-assignee"></div>
      <div id="task-popup-notes"></div>
    </div>
  </div>

  <div id="template-picker" class="template-picker hidden">
    <div class="template-picker__backdrop" id="template-picker-backdrop"></div>
    <div class="template-picker__panel">
      <h2 class="template-picker__title">Start from a template</h2>
      <div class="template-picker__grid" id="template-grid"></div>
      <button id="template-picker-cancel" class="btn">Cancel</button>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Add Group</h2>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <div class="modal__actions">
          <button type="submit" class="btn btn--primary">Save</button>
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="button" id="modal-delete" class="btn btn--danger hidden">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <footer class="site-footer">
    <a href="https://github.com/nilicule/roadmapTool" target="_blank" rel="noopener">built with <span class="site-footer__heart">&#9829;</span> &middot; source on GitHub</a>
  </footer>
</body>
</html>
