<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="toolbar">
    <h1 class="toolbar__title">Roadmap</h1>
    <div class="toolbar__actions">
      <button id="btn-add-group" class="btn btn--primary">+ Add Group</button>
      <button id="btn-export" class="btn">Export YAML</button>
    </div>
  </header>

  <div class="legend" id="legend"></div>

  <div class="chart-container">
    <svg id="roadmap-svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <h2 id="modal-title">Add Group</h2>
      <form id="modal-form">
        <div id="modal-fields"></div>
        <div class="modal__actions">
          <button type="submit" class="btn btn--primary">Save</button>
          <button type="button" id="modal-cancel" class="btn">Cancel</button>
          <button type="button" id="modal-delete" class="btn btn--danger hidden">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
